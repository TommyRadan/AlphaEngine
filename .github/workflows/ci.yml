name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOURCE_DIRS: "control event_engine rendering_engine scene_graph infrastructure external"
  CLANG_VERSION: "18"

jobs:
  # ---------------------------------------------------------------------------
  # clang-format: style gate. Runs on Ubuntu with a pinned LLVM version so the
  # formatting output is deterministic. This job does not compile, so it stays
  # on Linux even though the build matrix is Windows-only.
  # ---------------------------------------------------------------------------
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format ${{ env.CLANG_VERSION }}
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-${CLANG_VERSION}
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-${CLANG_VERSION} 100
          clang-format --version

      - name: Verify .clang-format is committed
        run: test -f .clang-format

      - name: Run clang-format --dry-run -Werror
        run: |
          set -euo pipefail
          files=$(find ${SOURCE_DIRS} -type f \( -name '*.cpp' -o -name '*.hpp' \) -print)
          if [ -z "${files}" ]; then
            echo "No source files found under: ${SOURCE_DIRS}" >&2
            exit 1
          fi
          echo "Checking $(echo "${files}" | wc -l) files"
          echo "${files}" | xargs clang-format --style=file --dry-run -Werror

  # ---------------------------------------------------------------------------
  # clang-tidy: static analysis. Runs on Linux where clang-tidy + libc++ come
  # from the distro with working include paths. GLM is fetched from source by
  # CMake via FetchContent during configure, so no system GLM package is
  # required.
  # ---------------------------------------------------------------------------
  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain and dev headers
        run: |
          set -euxo pipefail
          sudo apt-get update
          # CMakeLists.txt passes -stdlib=libc++ when the compiler is Clang, so
          # clang-tidy needs libc++ headers (not libstdc++) to resolve <cstdint>,
          # <functional>, <string>, etc. during analysis.
          sudo apt-get install -y --no-install-recommends \
            clang-${CLANG_VERSION} \
            clang-tidy-${CLANG_VERSION} \
            libc++-${CLANG_VERSION}-dev \
            libc++abi-${CLANG_VERSION}-dev \
            cmake \
            ninja-build \
            libsdl2-dev \
            libgl1-mesa-dev \
            libvulkan-dev
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-${CLANG_VERSION} 100
          sudo update-alternatives --install /usr/bin/run-clang-tidy run-clang-tidy /usr/bin/run-clang-tidy-${CLANG_VERSION} 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${CLANG_VERSION} 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${CLANG_VERSION} 100
          clang-tidy --version

      - name: Verify .clang-tidy is committed
        run: test -f .clang-tidy

      - name: Configure (export compile_commands.json)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build glad (resolves generated GL headers for tidy)
        run: cmake --build build --target glad

      - name: Run run-clang-tidy on subsystem sources
        run: |
          set -euo pipefail
          pattern="/(control|event_engine|rendering_engine|scene_graph|infrastructure|external)/"
          run-clang-tidy -p build -quiet "${pattern}"

  # ---------------------------------------------------------------------------
  # build: Windows MSVC build matrix (Debug + Release). Both the OpenGL and
  # Vulkan backends are compiled into the same binary and the runtime choice
  # is driven by settings::get_graphics_backend(); the Vulkan SDK is therefore
  # an unconditional build dependency. The SDK comes from the LunarG installer
  # at a pinned version so the job is reproducible; CMake's find_package(Vulkan)
  # picks it up through the VULKAN_SDK environment variable. glslang is fetched
  # from source by CMake (used both for the OpenGL ARB_gl_spirv path and the
  # Vulkan backend's shader compile). The Khronos validation layer is staged
  # alongside the executable so reviewers can run with VK validation enabled
  # without a system-wide SDK install.
  # ---------------------------------------------------------------------------
  build:
    name: build (windows-msvc ${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    env:
      VULKAN_SDK_VERSION: "1.3.296.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "${env:VULKAN_SDK_VERSION}"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          Write-Host "Downloading Vulkan SDK $version from $url"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe -UseBasicParsing
          # Silent install: --accept-licenses --default-answer --confirm-command
          # are the LunarG installer's unattended flags.
          Start-Process -FilePath .\VulkanSDK.exe `
            -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" `
            -Wait -NoNewWindow
          $sdk = "C:\VulkanSDK\$version"
          if (-not (Test-Path $sdk)) { throw "Vulkan SDK install failed: $sdk missing" }
          # Publish VULKAN_SDK + PATH so subsequent steps' find_package(Vulkan)
          # locates the headers and loader.
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Installed Vulkan SDK at $sdk"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: build-msvc-${{ matrix.configuration }}-${{ env.VULKAN_SDK_VERSION }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}-${{ github.sha }}
          restore-keys: |
            build-msvc-${{ matrix.configuration }}-${{ env.VULKAN_SDK_VERSION }}-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}-
            build-msvc-${{ matrix.configuration }}-${{ env.VULKAN_SDK_VERSION }}-

      - name: Configure (MSVC)
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64
          if ($LASTEXITCODE -ne 0) { throw "cmake configure failed" }

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ matrix.configuration }}
          if ($LASTEXITCODE -ne 0) { throw "cmake build failed" }

      - name: Verify output
        shell: pwsh
        run: |
          $exe = "Binaries\${{ matrix.configuration }}\AlphaEngine.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          Write-Host "Built $exe ($((Get-Item $exe).Length) bytes)"

      # Stage the Khronos validation layer alongside the executable so
      # the artifact is debuggable on a machine that does not have the
      # LunarG SDK installed. vk_device::create_instance() points
      # VK_LAYER_PATH at the executable directory when it spots the
      # bundled manifest, so dropping these files next to
      # AlphaEngine.exe is enough to enable validation at runtime.
      # Staged in both configurations because Release builds may also
      # be run with VK_INSTANCE_LAYERS=VK_LAYER_KHRONOS_validation for
      # ad-hoc validation.
      - name: Stage validation layer
        shell: pwsh
        run: |
          $sdkBin = "$env:VULKAN_SDK\Bin"
          $outDir = "Binaries\${{ matrix.configuration }}"
          $files = @(
            "VkLayer_khronos_validation.dll",
            "VkLayer_khronos_validation.json"
          )
          foreach ($f in $files) {
            $src = Join-Path $sdkBin $f
            if (-not (Test-Path $src)) { throw "Missing $src" }
            Copy-Item $src $outDir -Force
            Write-Host "Staged $f"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphaEngine-windows-${{ matrix.configuration }}
          path: |
            Binaries/${{ matrix.configuration }}/AlphaEngine.exe
            Binaries/${{ matrix.configuration }}/VkLayer_khronos_validation.dll
            Binaries/${{ matrix.configuration }}/VkLayer_khronos_validation.json
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # comment-artifacts: on pull requests, post (or update) a sticky comment
  # linking to the workflow run summary where the uploaded Debug/Release
  # artifacts can be downloaded. Gated on successful build.
  # ---------------------------------------------------------------------------
  comment-artifacts:
    name: comment-artifacts
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' && needs.build.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- ci-artifacts-comment -->';
            const body = [
              marker,
              '### CI build artifacts',
              '',
              `Windows Debug and Release builds are attached to the [workflow run summary](${runUrl}) under **Artifacts**:`,
              '',
              '- `AlphaEngine-windows-Debug` — Debug `AlphaEngine.exe` + Khronos validation layer',
              '- `AlphaEngine-windows-Release` — Release `AlphaEngine.exe` + Khronos validation layer',
              '',
              `_Run [#${context.runNumber}](${runUrl}) — commit \`${context.sha.slice(0, 7)}\`._`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
